<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="postit.css">
</head>
<body>
    <main class="post-it">
        <menu class="comandos-superior">
            
            <button class="recordatorio"><img class="clock" src="comandos_imagenes/clock-check.png" alt=""></button>
            
            <div class="panel-recordatorio" style="display: none;">
                <input type="date" class="recordatorio-fecha">
                <input type="time" class="recordatorio-hora">
                <button class="guardar-recordatorio">Guardar</button>
            </div>

            <button class="abrir-mas-postit"><img class="plus" src="comandos_imagenes/circle-plus.png" alt=""></button>
            <button class="cambio-fondo"><img class="founds" src="comandos_imagenes/circle-ellipsis.png" alt=""></button>

    <div class="panel-fondos" style="display: none;">
        <label class="boton-subir-fondo">
            Subir
            <input type="file" class="input-subir-fondo" accept="image/*" hidden>
        </label>

        <img class="mini-fondo" src="fondos/mandala.jpg" data-fondo="fondos/mandala.jpg">
        <img class="mini-fondo" src="fondos/cielo.jpg" data-fondo="fondos/cielo.jpg">
        <img class="mini-fondo" src="fondos/ciudad.jpg" data-fondo="fondos/ciudad.jpg">
        <img class="mini-fondo" src="fondos/desierto.jpg" data-fondo="fondos/desierto.jpg">
        <img class="mini-fondo" src="fondos/margaritas.jpg" data-fondo="fondos/margaritas.jpg">
    </div>

            <button class="cerrar-postit"><img class="close" src="comandos_imagenes/x.png" alt=""></button>   
        </menu>

        <section class="comando-escribir-titulo"><textarea class="title" placeholder="Escribe titulo" ></textarea></section>
    
        <div class="contenedor-imagen-fondo">

            <div class="contenido-postit" contenteditable="true" spellcheck="true"></div>
                <img class="imagenes-fondos" src="fondos/mandala.jpg">

        </div>

    <menu class="comando-inferior">

        <button class="boton-destacar"><img id="destacador" src="comandos_imagenes/highlighter.png" alt=""></button>
        <button class="boton-negrita"><img id="bold" src="comandos_imagenes/bold.png" alt=""></button>
        <button class="crear-lista"><img class="list" src="comandos_imagenes/list.png" alt=""></button>
        <button class="tachar-palabra"><img class="tachado" src="comandos_imagenes/tachado.png" alt=""></button>
    </menu>

    </main>
    <script src="storage.js"></script>
<script type="module" src="postit.js"></script>
</body>
</html>
